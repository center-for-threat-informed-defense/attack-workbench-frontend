<div class="dictionary-view grow-to-row">
  <div class="content">
    <table mat-table [dataSource]="dataSource" class="property-table">
      <ng-container *ngFor="let column of config.columns; let i = index" [matColumnDef]="column.name">
        <th mat-header-cell *matHeaderCellDef>{{ column.label || column.name }}</th>
        <td mat-cell *matCellDef="let element; let idx = index">
          {{dataSource[idx][column.name]}}
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="getDisplayedColumns()"></tr>
      <tr mat-row *matRowDef="let row; columns: getDisplayedColumns()"></tr>
    </table>
  </div>
  <span class="labelled-box-label">{{ config.label }}</span>
</div>
