<div class="name-property">
  <div *ngIf="!config.mode || config.mode === 'view'">
    <h1 class="lowercase">
      <span *ngIf="config.parent">
        <a class="external-link" [href]="internalParentLink" target="_blank">{{
          config.parent.name
        }}</a
        >:&nbsp;
      </span>
      {{ config.object[field] }}
      <mat-form-field
        *ngIf="showWorkflowControl"
        class="workflow-select"
        appearance="outline">
        <mat-select
          [formControl]="statusControl"
          [aria-label]="'workflow status'"
          [panelClass]="'workflow-select-panel'">
          <mat-select-trigger>
            <mat-icon
              class="workflow-status-icon"
              [class]="workflowColor(statusControl.value)"
              [matTooltip]="statusControl.value?.replaceAll('-', ' ')"
              matTooltipPosition="below">
              {{ workflowIcon(statusControl.value) }}
            </mat-icon>
          </mat-select-trigger>
          <mat-option
            *ngFor="let workflow of workflows"
            (onSelectionChange)="workflowChange($event)"
            [value]="workflow[0]"
            [attr.aria-label]="workflow[1]">
            <div class="workflow-option">
              <mat-icon
                class="workflow-status-icon"
                [class]="workflowColor(workflow[0])"
                [matTooltip]="workflow[1]"
                matTooltipPosition="right">
                {{ workflowIcon(workflow[0]) }}
              </mat-icon>
            </div>
          </mat-option>
        </mat-select>
      </mat-form-field>
    </h1>
    <h3 class="status">
      <span class="error-text" *ngIf="config.object['deprecated']"
        >deprecated</span
      >
      <span class="error-text" *ngIf="config.object['revoked'] && loaded"
        >revoked by: {{ currentTargetObj.stix.name }}</span
      >
    </h3>
  </div>
  <div *ngIf="config.mode === 'edit'">
    <mat-form-field
      class="name-edit"
      appearance="outline"
      [floatLabel]="config.parent ? 'always' : 'auto'">
      <mat-label>name</mat-label>
      <h1 class="lowercase">
        <div class="parent-name" *ngIf="config.parent" matTextPrefix>
          {{ config.parent.name }}:
        </div>
        <input
          class="c-align"
          matInput
          required
          [(ngModel)]="config.object[field]" />
      </h1>
    </mat-form-field>
    <h3 class="status">
      <span class="error-text" *ngIf="config.object['deprecated']"
        >deprecated</span
      >
      <span class="error-text" *ngIf="config.object['revoked'] && loaded"
        >revoked by: {{ currentTargetObj.stix.name }}</span
      >
    </h3>
  </div>
  <div *ngIf="config.mode === 'diff'">
    <h1 class="lowercase">
      <app-property-diff
        [before]="previousName"
        [after]="currentName"></app-property-diff>
    </h1>
    <h3 class="status">
      <span class="error-text">
        <app-property-diff
          [before]="getStatus(previous)"
          [after]="getStatus(current)"></app-property-diff>
      </span>
    </h3>
  </div>
</div>
