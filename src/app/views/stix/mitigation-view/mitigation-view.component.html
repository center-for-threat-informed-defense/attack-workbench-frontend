<div class="mitigation-view view-page">
  <div class="row">
    <div class="col">
      <app-name-property
        [config]="{
          mode: config.mode,
          object: config.object,
        }"></app-name-property>
      <app-subheading [config]="config"> </app-subheading>
    </div>
  </div>

  <app-stix-page-tabs
    [config]="config"
    [detailsTemplate]="detailsTpl"
    [relationshipTabs]="[{ label: 'Techniques', template: techniquesTpl }]">
  </app-stix-page-tabs>

  <ng-template #detailsTpl>
    <div class="grid spacing-16">
      <div class="row">
        <div class="col">
          <!-- ATT&CK ID -->
          <app-attackid-property
            class="grow-to-row"
            [config]="{
              mode: config.mode,
              object: config.object,
            }"></app-attackid-property>
        </div>
        <div class="col">
          <!-- VERSION NUMBER -->
          <app-version-property
            class="grow-to-row"
            [config]="{
              mode: config.mode,
              object: config.object,
            }"></app-version-property>
        </div>
      </div>
      <!-- DOMAIN -->
      <div class="row">
        <div class="col">
          <app-list-property
            class="grow-to-row"
            [config]="{
              mode: config.mode,
              object: config.object,
              field: 'domains',
              editType: 'select',
            }"></app-list-property>
        </div>
      </div>
      <!-- SECURITY CONTROLS -->
      <div *ngIf="showSecurityControls" class="row">
        <div class="col">
          <app-list-property
            class="grow-to-row"
            [config]="{
              mode: config.mode,
              object: config.object,
              field: 'securityControls',
              label: 'security controls',
              editType: 'any',
            }"></app-list-property>
        </div>
      </div>
      <div class="row">
        <div class="col">
          <!-- DESCRIPTION -->
          <app-descriptive-property
            [config]="{
              mode: config.mode,
              object: config.object,
              field: 'description',
              firstParagraphOnly: false,
              referencesField: 'external_references',
              label: 'Description',
            }"></app-descriptive-property>
        </div>
      </div>
      <div
        *ngIf="
          mitigation.external_references.list().length > 0 ||
          previous?.external_references.list().length > 0
        ">
        <div class="row">
          <div class="col">
            <h2 class="section-header">References</h2>
          </div>
        </div>
        <div class="row">
          <div class="col">
            <app-external-references-property
              [config]="{
                mode: config.mode,
                object: config.object,
                referencesField: 'external_references',
              }"></app-external-references-property>
          </div>
        </div>
      </div>
    </div>
  </ng-template>

  <ng-template #techniquesTpl>
    <div class="row">
      <div class="col">
        <h2 class="section-header">Techniques Addressed</h2>
      </div>
    </div>
    <div class="row" *ngIf="canEdit">
      <div class="col">
        <app-add-relationship-button
          (created)="mitigatesList.applyControls(); onReload.emit()"
          [config]="{
            label: 'add a technique',
            relationship_type: 'mitigates',
            targetType: 'technique',
            source_object: mitigation,
          }"></app-add-relationship-button>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <app-stix-list
          #mitigatesList
          [config]="{
            type: 'relationship',
            sourceRef: mitigation.stixID,
            relationshipType: 'mitigates',
            clickBehavior: 'dialog',
            allowEdits: true,
          }"></app-stix-list>
      </div>
    </div>
  </ng-template>
</div>
