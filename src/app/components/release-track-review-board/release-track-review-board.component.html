<div class="review-board">
  <section
    class="review-lane"
    [ngClass]="'review-lane-' + lane.modifier"
    *ngFor="let lane of lanes">
    <ng-container *ngIf="getLaneItems(lane) as laneItems">
      <div class="review-lane-header">
        <h3>{{ lane.title }} ({{ laneItems.length }})</h3>

        <button
          *ngIf="isReviewLane(lane)"
          class="bulk-review-button"
          mat-stroked-button
          type="button"
          [disabled]="!laneItems.length"
          (click)="onBulkReview(laneItems)">
          <mat-icon>fact_check</mat-icon>
          Bulk Review All
        </button>
      </div>

      <input
        class="review-search"
        type="search"
        [attr.aria-label]="'Search ' + lane.title"
        [placeholder]="lane.searchPlaceholder"
        [(ngModel)]="searchTerms[lane.status]" />

      <div class="review-lane-list">
        <div class="review-empty-state" *ngIf="!laneItems.length">
          {{ lane.emptyLabel }}
        </div>

        <app-release-track-object-card
          *ngFor="let item of laneItems; trackBy: trackByObjectRef"
          [cardType]="lane.modifier"
          [item]="item"
          [laneStatus]="lane.status"
          [showDescription]="true"
          [showModifiedMeta]="true"
          (viewObject)="viewObject.emit($event)"
          (diffObject)="diffObject.emit($event)">
        </app-release-track-object-card>
      </div>
    </ng-container>
  </section>
</div>
